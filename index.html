    <!-- Google Fonts — non-render-blocking. `display=swap` makes the browser
         paint immediately with system fallback, then swap when fonts load.
         This unblocks FCP on slow mobile networks (saves ~400-800ms). -->

    <!-- Critical above-fold CSS — paints the dark hero background immediately
         so FCP fires as soon as the HTML parses (no wait for the JS bundle
         or the hashed app CSS). Uses system-ui fallback so text renders
         instantly while Google Fonts swap in. -->
    <style>
      html,body{margin:0;padding:0;background:#17303B;color:#F7F4EE;font-family:'DM Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased}

      /* Pre-paint hero shell — visible before React hydrates, matches HeroSection.
         This becomes the FCP candidate on slow mobile (~1.5-3s earlier). */
      .ygs-prepaint{position:fixed;inset:0;background:#17303B;z-index:0;pointer-events:none}
      .ygs-prepaint__title{position:absolute;top:38%;left:5%;right:5%;color:#F7F4EE;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-weight:300;font-size:clamp(1.1rem,2.5vw,1.5rem);letter-spacing:.01em;line-height:1.2;text-align:left;opacity:.85}
      .ygs-prepaint__title b{display:block;color:#A88A5A;font-weight:600;font-size:clamp(2.4rem,9vw,5rem);font-style:italic;line-height:1;margin-top:.3rem}
      #root:not(:empty)~.ygs-prepaint{display:none}
      @keyframes img-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
      .img-shimmer{background:linear-gradient(90deg,#F7F4EE 25%,#ede9e0 50%,#F7F4EE 75%);background-size:200% 100%;animation:img-shimmer 1.5s infinite}
    </style>

    <!-- Route-specific JSON-LD injection (Breadcrumbs + Neighborhood schema).
         Gated: NOT loaded on home / EN-home, where the static JSON-LD blocks
         above (RealEstateAgent + Person + WebSite) already cover everything
         and there are no entries in jsonld-routes.js for "/" or "/en".
         `async` (not `defer`): it doesn't need DOM order, and async lets it
         not block DOMContentLoaded → better INP/TBT. -->
    <script>
      (function(){
        var p = location.pathname.replace(/\/+$/, "") || "/";
        if (p === "/" || p === "/en") return;
        var s = document.createElement("script");
        s.src = "/jsonld-routes.js";
        s.async = true;
        document.head.appendChild(s);
      })();
    </script>

    <!-- GA4 Consent Mode v2 — initialized BEFORE gtag.js is loaded by CookieConsent.
         Reads existing prefs from localStorage so returning visitors who already
         consented get the right default state on first paint. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;

      var savedPrefs = localStorage.getItem('ygs_cookie_prefs');
      var prefs = null;
      try {
        if (savedPrefs) prefs = JSON.parse(savedPrefs);
      } catch(e) {
        prefs = null;
      }

      // TOUJOURS appeler gtag('consent', 'default', ...) :
      // - Si prefs existent : utiliser leurs valeurs
      // - Si prefs n'existent pas : tout en 'denied' (RGPD strict)
      gtag('consent', 'default', {
        'ad_storage': prefs && prefs.marketing ? 'granted' : 'denied',
        'ad_user_data': prefs && prefs.marketing ? 'granted' : 'denied',
        'ad_personalization': prefs && prefs.marketing ? 'granted' : 'denied',
        'analytics_storage': prefs && prefs.analytics ? 'granted' : 'denied',
        'functionality_storage': 'granted',
        'security_storage': 'granted',
        'wait_for_update': 500
      });
    </script>

    <!-- GA4 gtag.js — loaded globally on every page. Consent Mode v2 above
         gates whether cookies/storage are used. send_page_view is disabled
         so the SPA can fire page_view manually on route changes. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P4Y8089EGB"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-P4Y8089EGB', { send_page_view: false });
    </script>

    <!-- Pre-paint hero shell — provides FCP within ~200-400ms on mobile,
         before the JS bundle downloads and React hydrates. The CSS rule
         `#root:not(:empty)~.ygs-prepaint{display:none}` removes it the
         instant React renders the real hero. Localized via inline script. -->
    <div class="ygs-prepaint" aria-hidden="true">
      <p class="ygs-prepaint__title" id="ygs-prepaint-title">
        <span id="ygs-prepaint-line1">Votre courtier immobilier</span>
        <b id="ygs-prepaint-line2">en Outaouais</b>
      </p>
    </div>
    <script>
      (function(){
        var p = location.pathname;
        if (p.indexOf('/en') === 0) {
          var l1 = document.getElementById('ygs-prepaint-line1');
          var l2 = document.getElementById('ygs-prepaint-line2');
          if (l1) l1.textContent = 'Your real estate broker';
          if (l2) l2.textContent = 'in Outaouais';
          document.documentElement.lang = 'en';
        }
        // Only show pre-paint on home routes (where it matches the real hero)
        if (p !== '/' && p !== '/en' && p !== '/en/') {
          var pp = document.querySelector('.ygs-prepaint');
          if (pp) pp.remove();
        }
      })();
    </script>
