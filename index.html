ase take?",a:"60 to 90 days generally from the start of your search to taking possession."},{q:"Is the process different in Québec?",a:"Yes — promise to purchase, inspection, notary (not a lawyer). I guide you every step of the way."},{q:"What additional fees should I expect beyond the purchase price?",a:"Notary (approximately $1,500), welcome tax, optional title insurance, and pre-purchase inspection."},{q:"How do you evaluate a plex's value?",a:"Income approach (GRM), comparable sales, building condition and rent optimization potential."},{q:"Is it still profitable to buy a plex in Gatineau?",a:"Yes, if the analysis is done right. Entry prices are still accessible and rental demand is strong."},{q:"What happens to tenants when I sell?",a:"Leases transfer to the new owner. The law protects tenants — we manage the transition properly."},{q:"How does a military real estate relocation work?",a:"We start by understanding your timeline and needs. Then, targeted search, visits (virtual or in-person) and complete support."},{q:"Do you work with IRP/BGRS programs?",a:"I understand the realities of these programs and adapt to the constraints and deadlines they impose."},{q:"Should I buy or rent during a posting?",a:"It depends on the length of your assignment and your situation. We discuss it together to find the best option."}]};
